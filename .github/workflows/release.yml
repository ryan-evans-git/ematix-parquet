name: release

# Publishes the four ematix-parquet crates to crates.io in dependency
# order when a `v*` tag is pushed (e.g. `v0.1.0`, `v0.2.0`).
#
# Order: ematix-parquet-format → ematix-parquet-io → ematix-parquet-codec
#        → ematix-parquet-async (added v0.4.0; depends on the other three).
# A short sleep after each publish gives crates.io's index time to
# propagate before the next crate's resolver tries to find it.
#
# Required repo secret:
#   CARGO_REGISTRY_TOKEN — from https://crates.io/me (scoped to
#   publish-update for these four crate names).

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Verify workspace builds
        run: cargo build --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Publish ematix-parquet-format
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ematix-parquet-format

      # crates.io's index needs ~30s after publish before the next
      # crate's resolver can find the just-published dependency.
      - name: Wait for index propagation
        run: sleep 45

      - name: Publish ematix-parquet-io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ematix-parquet-io

      - name: Wait for index propagation
        run: sleep 45

      - name: Publish ematix-parquet-codec
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ematix-parquet-codec

      - name: Wait for index propagation
        run: sleep 45

      - name: Publish ematix-parquet-async
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ematix-parquet-async
