name: ci

# Runs on every PR and on pushes to main. Branch protection on main
# gates merges on the `build-test` job (the required check). Format
# and clippy run as separate jobs that surface findings but are not
# (yet) required — flip them to required once the codebase is clean
# and the team agrees on style enforcement.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs for the same PR / branch when a new commit
# lands — saves CI minutes on quick-fire pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-test:
    name: build-test (${{ matrix.os }})
    # Per-arch matrix — every kernel is exercised on the hardware it
    # targets:
    #   macos-14      → aarch64 (Apple Silicon) NEON path
    #   ubuntu-latest → x86_64 AVX2 path (Π.12 onward)
    # Branch protection requires both `build-test (macos-14)` and
    # `build-test (ubuntu-latest)` to pass.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace --all-targets

      # Encryption feature is gated off by default; exercise it on
      # both runners so the encrypted-page / encrypted-footer paths
      # stay green and the feature gate keeps default builds crypto-
      # free.
      - name: Build workspace (encryption feature)
        run: cargo build --workspace --all-targets --features ematix-parquet-codec/encryption

      - name: Run tests (encryption feature)
        run: cargo test --workspace --all-targets --features ematix-parquet-codec/encryption

      # Parallel feature (Π.15) is similarly gated off by default;
      # exercise the parallel runner + cancellation token on both
      # runners so the rayon dep stays optional and the parallel-
      # specific paths stay green.
      - name: Build workspace (parallel feature)
        run: cargo build --workspace --all-targets --features ematix-parquet-codec/parallel

      - name: Run tests (parallel feature)
        run: cargo test --workspace --all-targets --features ematix-parquet-codec/parallel

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Format check is informational while the codebase has any pre-
    # existing diffs against `cargo fmt`. Promote to required (add to
    # branch protection) once the diff is zero.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: cargo fmt --check
        run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Clippy informational for now — there are stylistic findings
    # the codebase hasn't worked through. Promote to required once
    # the lint pass is clean. (`-D warnings` would gate hard.)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
